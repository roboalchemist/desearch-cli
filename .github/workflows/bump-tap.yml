name: Bump Homebrew Tap

on:
  release:
    types: [published]

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Update Homebrew formula
        run: |
          TAG=${{ github.event.release.tag_name }}
          VERSION=${TAG#v}
          git config --global user.name "github-actions"
          git config --global user.email "noreply@github.com"
          git clone https://roboalchemist:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/roboalchemist/homebrew-tap.git
          cd homebrew-tap
          sed -i "s|version \"[^\"]*\"|version \"${VERSION}\"|" Formula/desearch-cli.rb
          sed -i "s|tag: \"[^\"]*\"|tag: \"${TAG}\"|" Formula/desearch-cli.rb
          git add Formula/desearch-cli.rb
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "desearch-cli: bump to ${TAG}"
          git push origin main
